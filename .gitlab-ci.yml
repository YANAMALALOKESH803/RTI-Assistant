stages:
  - test

test:
  stage: test
  image: python:3.11

  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov

  script:
    - pytest --cov=. --cov-report=xml

  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
