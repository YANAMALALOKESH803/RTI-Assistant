stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

default:
  image: python:3.11
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt

lint:
  stage: lint
  script:
    - ruff check .
    - flake8 --config=.flake8 .
    - pylint --errors-only --rcfile=pyproject.toml tests
    - vulture app.py ingest.py tests --min-confidence=80

format:
  stage: format
  script:
    - black --check .
    - pyupgrade --py311-plus --exit-zero-even-if-changed app.py ingest.py tests/*.py

type_check:
  stage: type_check
  script:
    - mypy --follow-imports=skip app.py ingest.py

test:
  stage: test
  script:
    - pytest --no-cov

coverage:
  stage: coverage
  script:
    - pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=51
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

security:
  stage: security
  script:
    - bandit -r app.py ingest.py -ll
    - semgrep --config=auto --error app.py ingest.py
