line-length = 100
python_version = "3.11"
ignore_missing_ports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=51"

[tool.coverage.run]
source = ["."]

[tool.coverage.report]
show_missing = true
fail_under = 51

[tool.coverage.xml]
output = "coverage.xml"
