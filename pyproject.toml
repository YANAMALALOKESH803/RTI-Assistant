[tool.ruff]
line-length = 100
target-version = "py311"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
follow_imports = "skip"
files = ["app.py", "ingest.py"]

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv"]
skips = ["B101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=51"

[tool.coverage.run]
source = ["."]

[tool.coverage.report]
show_missing = true
fail_under = 51

[tool.coverage.xml]
output = "coverage.xml"
